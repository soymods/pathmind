name: Build

on:
  push:
  pull_request:

permissions:
  contents: write
  actions: read

jobs:
  discover-targets:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.versions.outputs.versions }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Discover supported Minecraft targets
        id: versions
        shell: bash
        run: |
          VERSIONS="$(grep -E '^\s*"[0-9]+\.[0-9]+(\.[0-9]+)?"\s+to\s+MinecraftVersionSpec\(' build.gradle.kts \
            | sed -E 's/^\s*"([^"]+)".*/\1/' \
            | jq -R . \
            | jq -s -c .)"

          echo "versions=${VERSIONS}" >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Download Baritone API dependency
        run: |
          mkdir -p libs
          curl -L -o libs/baritone-api-fabric-1.15.0.jar \
            https://github.com/cabaletta/baritone/releases/download/v1.15.0/baritone-api-fabric-1.15.0.jar

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Unit tests
        run: ./gradlew test

  build:
    needs:
      - discover-targets
      - test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        minecraft_version: ${{ fromJSON(needs.discover-targets.outputs.versions) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Download Baritone API dependency
        run: |
          mkdir -p libs
          curl -L -o libs/baritone-api-fabric-1.15.0.jar \
            https://github.com/cabaletta/baritone/releases/download/v1.15.0/baritone-api-fabric-1.15.0.jar

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build mod jar for Minecraft ${{ matrix.minecraft_version }}
        run: ./gradlew assemble -Pmc_version=${{ matrix.minecraft_version }}

      - name: Pick mod jar for Minecraft ${{ matrix.minecraft_version }}
        id: jar
        shell: bash
        run: |
          JAR="$(find build/libs -maxdepth 1 -type f -name '*.jar' \
            | grep -Ev '(-sources|-javadoc|-dev|-shadow|-all)\.jar$' \
            | sort \
            | head -n 1)"

          if [ -z "$JAR" ]; then
            echo "No suitable jar found for Minecraft ${{ matrix.minecraft_version }}."
            find build/libs -maxdepth 1 -type f | sort || true
            exit 1
          fi

          echo "jar_path=$JAR" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$(basename "$JAR")" >> "$GITHUB_OUTPUT"

      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.jar.outputs.artifact_name }}
          path: ${{ steps.jar.outputs.jar_path }}
          if-no-files-found: error
          retention-days: 90

  notify-discord:
    if: ${{ github.event_name == 'push' && github.ref_name == github.event.repository.default_branch }}
    needs:
      - publish-prerelease
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Download release jars
        uses: actions/download-artifact@v4
        with:
          path: build/release-assets
          merge-multiple: true

      - name: Post build links to Discord
        shell: bash
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: "1498698231796859070"
        run: |
          set -euo pipefail

          if [ -z "${DISCORD_BOT_TOKEN:-}" ]; then
            echo "DISCORD_BOT_TOKEN is not configured; skipping Discord notification."
            exit 0
          fi

          COMMIT_SHA="${GITHUB_SHA}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          COMMIT_MESSAGE="$(jq -r '.head_commit.message // .pull_request.title // ""' "$GITHUB_EVENT_PATH" | head -n 1)"
          if [ -z "${COMMIT_MESSAGE:-}" ] || [ "${COMMIT_MESSAGE}" = "null" ]; then
            COMMIT_MESSAGE="No commit message available"
          fi
          BUILD_TIMESTAMP="$(date -u +%s)"

          mapfile -t jars < <(find build/release-assets -maxdepth 1 -type f -name '*.jar' | sort)
          if [ "${#jars[@]}" -eq 0 ]; then
            echo "No release jars were available to post."
            exit 1
          fi

          DOWNLOADS="$(
            printf '%s\n' "${jars[@]}" \
              | sed 's#^.*/##' \
              | jq -R . \
              | jq -s -r --arg repo "${GITHUB_REPOSITORY}" '
                  sort_by(capture("\\+mc(?<version>[0-9.]+)\\.jar$").version | split(".") | map(tonumber))
                  | map(
                      "• `"
                      + (capture("\\+mc(?<version>[0-9.]+)\\.jar$").version)
                      + "` - [Download](<https://github.com/"
                      + $repo
                      + "/releases/download/test-builds/"
                      + .
                      + ">)"
                    )
                  | join("\n")
                '
          )"

          if [ -z "${DOWNLOADS:-}" ]; then
            echo "No release download links were available to post."
            exit 1
          fi

          SUMMARY_LINE="$(printf '**Branch:** %s\n**Commit:** [`%s`](<https://github.com/%s/commit/%s>) %s\n**Built:** <t:%s:F>' \
            "${GITHUB_REF_NAME:-${GITHUB_REF}}" \
            "${SHORT_SHA}" \
            "${GITHUB_REPOSITORY}" \
            "${COMMIT_SHA}" \
            "${COMMIT_MESSAGE}" \
            "${BUILD_TIMESTAMP}")"

          DESCRIPTION="$(printf '%s\n\n**Downloads**\n%s\n\n[View GitHub Actions run](<https://github.com/%s/actions/runs/%s>)' \
            "${SUMMARY_LINE}" \
            "${DOWNLOADS}" \
            "${GITHUB_REPOSITORY}" \
            "${GITHUB_RUN_ID}")"

          PAYLOAD="$(jq -cn \
            --arg title "Pathmind test builds" \
            --arg url "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --arg description "$DESCRIPTION" \
            '{
              embeds: [
                {
                  title: $title,
                  url: $url,
                  description: $description,
                  color: 5763719
                }
              ]
            }')"

          curl --fail-with-body -sS \
            -X POST \
            "https://discord.com/api/v10/channels/${DISCORD_CHANNEL_ID}/messages" \
            -H "Authorization: Bot ${DISCORD_BOT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

  publish-prerelease:
    if: ${{ github.event_name == 'push' && github.ref_name == github.event.repository.default_branch }}
    needs:
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download release jars
        uses: actions/download-artifact@v4
        with:
          path: build/release-assets
          merge-multiple: true

      - name: Publish rolling prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t jars < <(find build/release-assets -maxdepth 1 -type f -name '*.jar' | sort)
          if [ "${#jars[@]}" -eq 0 ]; then
            echo "No release jars were downloaded."
            exit 1
          fi

          notes_file="$(mktemp)"
          {
            echo "Rolling test-build prerelease for Pathmind."
            echo
            echo "Commit: ${GITHUB_SHA}"
            echo "Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } > "$notes_file"

          if gh release view test-builds >/dev/null 2>&1; then
            gh release delete test-builds --yes --cleanup-tag
          fi

          gh release create test-builds "${jars[@]}" \
            --target "${GITHUB_SHA}" \
            --title "Pathmind test builds" \
            --notes-file "$notes_file" \
            --prerelease
