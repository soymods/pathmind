name: Build

on:
  push:
  pull_request:

permissions:
  contents: write
  actions: read

jobs:
  discover-targets:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Discover supported Minecraft targets
        id: targets
        shell: bash
        run: |
          MANIFEST=gradle/minecraft-versions.properties
          TARGETS="$(sed -n 's/^supported_versions=//p' "$MANIFEST" | tr ',' '\n' | while read -r version; do
            java_version="$(awk -F= -v key="version.${version}.java_version" '$1 == key { print $2 }' "$MANIFEST")"
            generation="$(awk -F= -v key="version.${version}.packaging_generation" '$1 == key { print $2 }' "$MANIFEST")"
            jq -cn \
              --arg minecraft_version "$version" \
              --arg java_version "$java_version" \
              --arg packaging_generation "$generation" \
              '{minecraft_version: $minecraft_version, java_version: $java_version, packaging_generation: $packaging_generation}'
          done | jq -sc '{include: .}')"

          echo "matrix=${TARGETS}" >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: |
            **/*.gradle*
            gradle/wrapper/gradle-wrapper.properties
            gradle/build-generation-cache/pre26-remapped.marker

      - name: Download Baritone API dependency
        run: |
          mkdir -p libs
          curl -L -o libs/baritone-api-fabric-1.15.0.jar \
            https://github.com/cabaletta/baritone/releases/download/v1.15.0/baritone-api-fabric-1.15.0.jar

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Verify compatibility manifest
        run: ./gradlew verifyCompatibilityManifest verifyBuildGenerationRouting -Pmc_version=1.21.11

      - name: Verify unknown targets fail during configuration
        shell: bash
        run: |
          if ./gradlew help -Pmc_version=pathmind-invalid > unknown-target.log 2>&1; then
            echo "Unknown target unexpectedly configured successfully."
            exit 1
          fi
          grep -F "No version spec configured for Minecraft pathmind-invalid" unknown-target.log

      - name: Unit tests
        run: ./gradlew :common:test -Pmc_version=1.21.11

  build:
    needs:
      - discover-targets
      - test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover-targets.outputs.matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java_version }}
          cache: gradle
          cache-dependency-path: |
            **/*.gradle*
            gradle/wrapper/gradle-wrapper.properties
            gradle/build-generation-cache/${{ matrix.packaging_generation }}.marker

      - name: Download Baritone API dependency
        run: |
          mkdir -p libs
          curl -L -o libs/baritone-api-fabric-1.15.0.jar \
            https://github.com/cabaletta/baritone/releases/download/v1.15.0/baritone-api-fabric-1.15.0.jar

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build mod jars for Minecraft ${{ matrix.minecraft_version }}
        run: ./gradlew buildSelectedTarget -Pmc_version=${{ matrix.minecraft_version }}

      - name: Stage release jars
        shell: bash
        run: |
          mkdir -p staging
          find fabric/build/libs neoforge/build/libs \
            -maxdepth 1 -type f -name '*.jar' \
            | grep -Ev '(-sources|-dev|-shadow|-all|-javadoc)\.jar$' \
            | xargs -I{} cp {} staging/

          echo "Staged jars for Minecraft ${{ matrix.minecraft_version }}:"
          ls staging/
          if [ -z "$(ls -A staging/)" ]; then
            echo "No suitable jars found."
            find fabric/build/libs neoforge/build/libs -maxdepth 1 -type f | sort || true
            exit 1
          fi

          MOD_VERSION="$(sed -n 's/^mod_version=//p' gradle.properties)"
          LOADERS="$(awk -F= -v key="version.${{ matrix.minecraft_version }}.release_loaders" '$1 == key { print $2 }' gradle/minecraft-versions.properties)"
          IFS=',' read -ra EXPECTED_LOADERS <<< "$LOADERS"
          for loader in "${EXPECTED_LOADERS[@]}"; do
            expected="staging/pathmind-${loader}-${MOD_VERSION}+mc${{ matrix.minecraft_version }}.jar"
            if [ ! -f "$expected" ]; then
              echo "Missing expected release jar: $expected"
              exit 1
            fi
          done
          STAGED_COUNT="$(find staging -maxdepth 1 -type f -name '*.jar' | wc -l | tr -d ' ')"
          if [ "$STAGED_COUNT" -ne "${#EXPECTED_LOADERS[@]}" ]; then
            echo "Expected ${#EXPECTED_LOADERS[@]} release jars but staged $STAGED_COUNT."
            exit 1
          fi

      - name: Upload mod jars
        uses: actions/upload-artifact@v4
        with:
          name: pathmind-mc${{ matrix.minecraft_version }}
          path: staging/
          if-no-files-found: error
          retention-days: 90

  notify-discord:
    if: ${{ github.event_name == 'push' && github.ref_name == github.event.repository.default_branch }}
    needs:
      - publish-prerelease
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Download release jars
        uses: actions/download-artifact@v4
        with:
          path: build/release-assets
          merge-multiple: true

      - name: Post build links to Discord
        shell: bash
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: "1498698231796859070"
        run: |
          set -euo pipefail

          if [ -z "${DISCORD_BOT_TOKEN:-}" ]; then
            echo "DISCORD_BOT_TOKEN is not configured; skipping Discord notification."
            exit 0
          fi

          COMMIT_SHA="${GITHUB_SHA}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          COMMIT_MESSAGE="$(jq -r '.head_commit.message // .pull_request.title // ""' "$GITHUB_EVENT_PATH" | head -n 1)"
          if [ -z "${COMMIT_MESSAGE:-}" ] || [ "${COMMIT_MESSAGE}" = "null" ]; then
            COMMIT_MESSAGE="No commit message available"
          fi
          BUILD_TIMESTAMP="$(date -u +%s)"

          mapfile -t jars < <(find build/release-assets -maxdepth 1 -type f -name '*.jar' | sort)
          if [ "${#jars[@]}" -eq 0 ]; then
            echo "No release jars were available to post."
            exit 1
          fi

          format_downloads_for_platform() {
            local platform="$1"

            printf '%s\n' "${jars[@]}" \
              | sed 's#^.*/##' \
              | jq -R . \
              | jq -s -r --arg repo "${GITHUB_REPOSITORY}" --arg platform "${platform}" '
                  map(select(test("-" + $platform + "-")))
                  | sort_by(capture("\\+mc(?<version>[0-9.]+)\\.jar$").version | split(".") | map(tonumber))
                  | map(
                      "* `"
                      + (capture("\\+mc(?<version>[0-9.]+)\\.jar$").version)
                      + "` - [Download](<https://github.com/"
                      + $repo
                      + "/releases/download/test-builds/"
                      + .
                      + ">)"
                    )
                  | join("\n")
                '
          }

          FABRIC_DOWNLOADS="$(format_downloads_for_platform fabric)"
          NEOFORGE_DOWNLOADS="$(format_downloads_for_platform neoforge)"

          if [ -z "${FABRIC_DOWNLOADS}${NEOFORGE_DOWNLOADS}" ]; then
            echo "No release download links were available to post."
            exit 1
          fi

          DOWNLOADS="$(printf '**Fabric**\n%s\n\n**Neoforge (BETA)**\n%s' \
            "${FABRIC_DOWNLOADS:-_No Fabric jars were found._}" \
            "${NEOFORGE_DOWNLOADS:-_No Neoforge jars were found._}")"

          SUMMARY_LINE="$(printf '**Branch:** %s\n**Commit:** [`%s`](<https://github.com/%s/commit/%s>) %s\n**Built:** <t:%s:F>' \
            "${GITHUB_REF_NAME:-${GITHUB_REF}}" \
            "${SHORT_SHA}" \
            "${GITHUB_REPOSITORY}" \
            "${COMMIT_SHA}" \
            "${COMMIT_MESSAGE}" \
            "${BUILD_TIMESTAMP}")"

          DESCRIPTION="$(printf '%s\n\n**Downloads**\n%s\n\n[View GitHub Actions run](<https://github.com/%s/actions/runs/%s>)' \
            "${SUMMARY_LINE}" \
            "${DOWNLOADS}" \
            "${GITHUB_REPOSITORY}" \
            "${GITHUB_RUN_ID}")"

          PAYLOAD="$(jq -cn \
            --arg title "Pathmind test builds" \
            --arg url "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --arg description "$DESCRIPTION" \
            '{
              embeds: [
                {
                  title: $title,
                  url: $url,
                  description: $description,
                  color: 5763719
                }
              ]
            }')"

          curl --fail-with-body -sS \
            -X POST \
            "https://discord.com/api/v10/channels/${DISCORD_CHANNEL_ID}/messages" \
            -H "Authorization: Bot ${DISCORD_BOT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

  publish-prerelease:
    if: ${{ github.event_name == 'push' && github.ref_name == github.event.repository.default_branch }}
    needs:
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download release jars
        uses: actions/download-artifact@v4
        with:
          path: build/release-assets
          merge-multiple: true

      - name: Publish rolling prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t jars < <(find build/release-assets -maxdepth 1 -type f -name '*.jar' | sort)
          if [ "${#jars[@]}" -eq 0 ]; then
            echo "No release jars were downloaded."
            exit 1
          fi

          notes_file="$(mktemp)"
          {
            echo "Rolling test-build prerelease for Pathmind."
            echo
            echo "Commit: ${GITHUB_SHA}"
            echo "Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } > "$notes_file"

          if gh release view test-builds >/dev/null 2>&1; then
            gh release delete test-builds --yes --cleanup-tag
          fi

          gh release create test-builds "${jars[@]}" \
            --target "${GITHUB_SHA}" \
            --title "Pathmind test builds" \
            --notes-file "$notes_file" \
            --prerelease
