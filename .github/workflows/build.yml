name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Download Baritone API dependency
        run: |
          mkdir -p libs
          curl -L -o libs/baritone-api-fabric-1.15.0.jar \
            https://github.com/cabaletta/baritone/releases/download/v1.15.0/baritone-api-fabric-1.15.0.jar

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Unit tests
        run: ./gradlew test

      - name: Build all supported Minecraft targets
        run: ./gradlew buildAllTargets

      - name: Verify all expected release jars exist
        shell: bash
        run: |
          EXPECTED_COUNT="$(grep -E '^\s*"[0-9]+\.[0-9]+(\.[0-9]+)?"\s+to\s+MinecraftVersionSpec\(' build.gradle.kts | wc -l | tr -d ' ')"
          ACTUAL_COUNT="$(find build/multiVersion -maxdepth 2 -type f -name '*.jar' \
            | grep -Ev '(-sources|-javadoc|-dev|-shadow|-all)\.jar$' \
            | grep -c '\+mc')"

          echo "Expected jars: $EXPECTED_COUNT"
          echo "Actual jars:   $ACTUAL_COUNT"

          if [ "$ACTUAL_COUNT" -ne "$EXPECTED_COUNT" ]; then
            echo "Mismatch between supported targets and built jars."
            find build/multiVersion -maxdepth 2 -type f | sort || true
            exit 1
          fi

      - name: Stage distributable jars
        id: stage_jars
        shell: bash
        run: |
          STAGING_DIR="build/ci-artifacts"
          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_DIR"

          find build/multiVersion -maxdepth 2 -type f -name '*.jar' \
            | grep -Ev '(-sources|-javadoc|-dev|-shadow|-all)\.jar$' \
            | sort > build/distributable-jars.txt

          if [ ! -s build/distributable-jars.txt ]; then
            echo "No distributable jars were produced."
            find build/multiVersion -maxdepth 2 -type f | sort || true
            exit 1
          fi

          while IFS= read -r jar; do
            cp "$jar" "$STAGING_DIR/"
          done < build/distributable-jars.txt

          COUNT="$(wc -l < build/distributable-jars.txt | tr -d ' ')"
          echo "artifact_name=pathmind-test-builds-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "staging_dir=$STAGING_DIR" >> "$GITHUB_OUTPUT"
          echo "jar_count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Upload all mod jars
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage_jars.outputs.artifact_name }}
          path: ${{ steps.stage_jars.outputs.staging_dir }}
          if-no-files-found: error

      - name: Post jars to Discord
        if: ${{ github.event_name == 'push' }}
        continue-on-error: true
        shell: bash
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: "1498698231796859070"
          ARTIFACT_NAME: ${{ steps.stage_jars.outputs.artifact_name }}
          JAR_COUNT: ${{ steps.stage_jars.outputs.jar_count }}
        run: |
          set -euo pipefail

          if [ -z "${DISCORD_BOT_TOKEN:-}" ]; then
            echo "DISCORD_BOT_TOKEN is not configured; skipping Discord notification."
            exit 0
          fi

          mapfile -t jars < <(find "${{ steps.stage_jars.outputs.staging_dir }}" -maxdepth 1 -type f -name '*.jar' | sort)
          if [ "${#jars[@]}" -eq 0 ]; then
            echo "No jars available to send to Discord."
            exit 1
          fi

          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          ref_name="${GITHUB_REF_NAME:-${GITHUB_SHA}}"
          batch_size=10
          total_batches=$(( (${#jars[@]} + batch_size - 1) / batch_size ))
          batch_index=0

          for ((i=0; i<${#jars[@]}; i+=batch_size)); do
            batch_index=$((batch_index + 1))
            payload_json="$(jq -cn \
              --arg content "**Pathmind test builds** for \`${ref_name}\`\n${JAR_COUNT} jars attached\n[GitHub Actions run](<${run_url}>)\n*Batch ${batch_index}/${total_batches}*" \
              '{content: $content}')"

            curl_args=(
              --fail-with-body
              -sS
              -X POST
              "https://discord.com/api/v10/channels/${DISCORD_CHANNEL_ID}/messages"
              -H "Authorization: Bot ${DISCORD_BOT_TOKEN}"
              -F "payload_json=${payload_json}"
            )

            file_index=0
            for ((j=i; j<i+batch_size && j<${#jars[@]}; j++)); do
              curl_args+=(-F "files[${file_index}]=@${jars[$j]}")
              file_index=$((file_index + 1))
            done

            curl "${curl_args[@]}"
          done
